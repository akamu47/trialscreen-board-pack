<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrialScreen — Content Library</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #01696F; --teal-hover: #0C4E54; --teal-light: #E8F0F1;
    --text: #28251D; --muted: #7A7974; --faint: #BAB9B4;
    --border: #D4D1CA; --bg: #F7F6F2; --surface: #FFFFFF; --surface-alt: #FBFBF9;
    --amber: #964219;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.55; color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--teal); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; gap: 24px;
    justify-content: space-between;
  }
  .topbar .back {
    font-size: 13px; color: var(--muted); font-weight: 500;
  }
  .topbar .brand {
    font-size: 13px; font-weight: 700; letter-spacing: 0.15em;
    color: var(--teal); text-transform: uppercase;
  }
  .topbar .right { display: flex; gap: 18px; font-size: 13px; color: var(--muted); }

  .container { max-width: 1320px; margin: 0 auto; padding: 32px; }

  .page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 8px; }
  .page-subtitle { font-size: 15px; color: var(--muted); margin: 0 0 24px; max-width: 720px; }

  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
    padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  }
  .filter-bar .label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--muted);
    text-transform: uppercase; margin-right: 8px; align-self: center;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface-alt); font-size: 12px; font-weight: 500; color: var(--text);
    cursor: pointer; transition: all 0.12s;
  }
  .chip:hover { border-color: var(--teal); }
  .chip.active { background: var(--teal); color: white; border-color: var(--teal); }
  .chip .count { font-size: 11px; color: var(--muted); }
  .chip.active .count { color: rgba(255,255,255,0.7); }

  .search-input {
    flex: 1; min-width: 200px;
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface);
    outline: none;
  }
  .search-input:focus { border-color: var(--teal); }

  .results-meta { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .card {
    display: flex; flex-direction: column;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 16px; cursor: pointer; transition: border-color 0.12s, transform 0.12s;
    min-height: 180px;
  }
  .card:hover { border-color: var(--teal); transform: translateY(-2px); }

  .card-meta {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .badge {
    padding: 3px 8px; border-radius: 2px; background: var(--teal-light); color: var(--teal);
  }
  .badge.muted { background: var(--surface-alt); color: var(--muted); border: 1px solid var(--border); }

  .card-id { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--faint); font-weight: 500; margin-bottom: 6px; }
  .card-title { font-size: 14px; font-weight: 700; line-height: 1.35; color: var(--text); margin: 0 0 6px; }
  .card-subtitle { font-size: 12px; color: var(--muted); margin: 0 0 10px; line-height: 1.4; }

  .card-preview {
    font-size: 12px; color: var(--muted); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden; flex: 1;
  }

  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
  }
  .card-footer .open { font-size: 11px; font-weight: 600; color: var(--teal); letter-spacing: 0.04em; }

  /* Detail modal */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; overflow-y: auto; padding: 48px 20px;
  }
  .modal-backdrop.open { display: block; }
  .modal {
    max-width: 800px; margin: 0 auto; background: var(--surface);
    border-radius: 4px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
    padding: 28px 32px 20px; border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .modal-close {
    padding: 6px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 3px;
    background: var(--surface); color: var(--muted); cursor: pointer; font-family: inherit;
    white-space: nowrap;
  }
  .modal-close:hover { border-color: var(--teal); color: var(--teal); }
  .modal-body { padding: 24px 32px 32px; }
  .modal-body .meta { font-size: 12px; color: var(--muted); margin-bottom: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
  .modal-body .id-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--faint);
    padding: 2px 8px; border: 1px solid var(--border); border-radius: 2px;
  }

  .copy-btn {
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    background: var(--teal); color: white; border: none; border-radius: 3px;
    cursor: pointer; font-family: inherit;
  }
  .copy-btn:hover { background: var(--teal-hover); }
  .copy-btn.copied { background: var(--amber); }

  .content-body {
    white-space: pre-wrap; font-size: 14px; line-height: 1.65; color: var(--text);
    background: var(--surface-alt); border: 1px solid var(--border); border-radius: 3px;
    padding: 20px; margin-top: 16px;
    max-height: none;
    overflow-wrap: break-word;
  }
  .content-body strong { font-weight: 700; }
  .content-body table { border-collapse: collapse; margin: 10px 0; font-size: 13px; }
  .content-body th, .content-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .content-body th { background: var(--bg); font-weight: 700; }
  .content-body code { background: var(--bg); padding: 1px 5px; border-radius: 2px; font-size: 13px; }

  footer { margin-top: 60px; padding: 24px 0; border-top: 1px solid var(--border); font-size: 12px; color: var(--faint); text-align: center; }

  @media (max-width: 640px) {
    .container { padding: 20px 16px; }
    .grid { grid-template-columns: 1fr; }
    .modal-header, .modal-body { padding-left: 20px; padding-right: 20px; }
    .topbar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="display: flex; gap: 24px; align-items: center;">
    <a href="index.html" class="back">← Back to pack</a>
    <div class="brand">TrialScreen</div>
  </div>
  <div class="right" id="track-switcher">
    <a href="?track=sponsor" id="link-sponsor">Sponsor content</a>
    <a href="?track=participant" id="link-participant">Participant content</a>
  </div>
</div>

<div class="container">
  <h1 class="page-title" id="page-title">Loading…</h1>
  <p class="page-subtitle" id="page-subtitle"></p>

  <div class="filter-bar">
    <span class="label">Filter</span>
    <div id="type-chips" style="display: flex; gap: 6px; flex-wrap: wrap;"></div>
    <input class="search-input" id="search" placeholder="Search title, body, or ID…" />
  </div>

  <div class="results-meta" id="results-meta"></div>

  <div class="grid" id="grid"></div>

  <footer>
    TrialScreen · Content Library · April 2026<br/>
    Confidential — first-draft content pending editorial review.
  </footer>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div style="flex: 1;">
        <div class="meta">
          <span class="id-tag" id="modal-id"></span>
          <span class="badge" id="modal-type"></span>
          <span class="badge muted" id="modal-section"></span>
        </div>
        <h2 id="modal-title" style="margin: 0; font-size: 22px; font-weight: 700; line-height: 1.3;"></h2>
        <p id="modal-subtitle" style="margin: 8px 0 0; font-size: 14px; color: var(--muted);"></p>
      </div>
      <div style="display: flex; gap: 8px; flex-direction: column; align-items: flex-end;">
        <button class="modal-close" onclick="closeModal()">Close</button>
        <button class="copy-btn" id="copy-btn">Copy content</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="content-body" id="modal-body"></div>
    </div>
  </div>
</div>

<script>
(async () => {
  // Read track from URL
  const params = new URLSearchParams(window.location.search);
  const track = params.get('track') === 'participant' ? 'participant' : 'sponsor';

  // Update nav highlighting
  const linkSponsor = document.getElementById('link-sponsor');
  const linkParticipant = document.getElementById('link-participant');
  if (track === 'sponsor') { linkSponsor.style.color = 'var(--teal)'; linkSponsor.style.fontWeight = '700'; }
  else { linkParticipant.style.color = 'var(--teal)'; linkParticipant.style.fontWeight = '700'; }

  // Update page title
  if (track === 'sponsor') {
    document.getElementById('page-title').textContent = 'Sponsor Content Library';
    document.getElementById('page-subtitle').textContent = 'B2B content for pharma, CRO, site and institutional audiences. Click any card to view and copy the full draft.';
    document.title = 'TrialScreen — Sponsor Content Library';
  } else {
    document.getElementById('page-title').textContent = 'Participant Content Library';
    document.getElementById('page-subtitle').textContent = 'Patient and community content across Facebook, Instagram, Reels, Blog, Email, YouTube, webinars and awareness campaigns. Click any card to view and copy the full draft.';
    document.title = 'TrialScreen — Participant Content Library';
  }

  // Load data
  let items = [];
  try {
    const res = await fetch(`content/${track}.json`);
    items = await res.json();
  } catch (err) {
    document.getElementById('grid').innerHTML = `<div style="color: var(--amber); padding: 20px;">Failed to load content. ${err.message}</div>`;
    return;
  }

  // Generate preview (first ~280 chars of body, strip some markdown)
  function makePreview(body) {
    if (!body) return '';
    let t = body
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '• ')
      .replace(/^#+\s+/gm, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/\n{2,}/g, '\n')
      .trim();
    return t.substring(0, 280);
  }

  // Gather unique types
  const types = [...new Set(items.map(i => i.type))].sort();
  const typeChips = document.getElementById('type-chips');
  const typeCounts = {};
  items.forEach(i => { typeCounts[i.type] = (typeCounts[i.type] || 0) + 1; });

  let activeType = 'All';
  const chipAll = document.createElement('button');
  chipAll.className = 'chip active';
  chipAll.innerHTML = `All <span class="count">${items.length}</span>`;
  chipAll.onclick = () => { activeType = 'All'; updateChips(); render(); };
  typeChips.appendChild(chipAll);

  types.forEach(type => {
    const c = document.createElement('button');
    c.className = 'chip';
    c.dataset.type = type;
    c.innerHTML = `${type} <span class="count">${typeCounts[type]}</span>`;
    c.onclick = () => { activeType = type; updateChips(); render(); };
    typeChips.appendChild(c);
  });

  function updateChips() {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    if (activeType === 'All') chipAll.classList.add('active');
    else document.querySelector(`.chip[data-type="${CSS.escape(activeType)}"]`).classList.add('active');
  }

  // Search
  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', render);

  function render() {
    const q = searchInput.value.toLowerCase().trim();
    let filtered = items;
    if (activeType !== 'All') filtered = filtered.filter(i => i.type === activeType);
    if (q) {
      filtered = filtered.filter(i =>
        (i.id && i.id.toLowerCase().includes(q)) ||
        (i.title && i.title.toLowerCase().includes(q)) ||
        (i.subtitle && i.subtitle.toLowerCase().includes(q)) ||
        (i.body && i.body.toLowerCase().includes(q))
      );
    }

    document.getElementById('results-meta').textContent =
      `${filtered.length} of ${items.length} items${activeType !== 'All' ? ' · ' + activeType : ''}${q ? ' · search "' + q + '"' : ''}`;

    const grid = document.getElementById('grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: var(--muted);">No items match these filters.</div>`;
      return;
    }

    grid.innerHTML = filtered.map((item, idx) => `
      <div class="card" data-idx="${items.indexOf(item)}">
        <div class="card-meta">
          <span class="badge">${escapeHtml(item.type)}</span>
        </div>
        <div class="card-id">${escapeHtml(item.id || '—')}</div>
        <div class="card-title">${escapeHtml(item.title || 'Untitled')}</div>
        ${item.subtitle ? `<div class="card-subtitle">${escapeHtml(item.subtitle)}</div>` : ''}
        <div class="card-preview">${escapeHtml(makePreview(item.body))}</div>
        <div class="card-footer">
          <span style="font-size: 11px; color: var(--faint);">${escapeHtml(item.section || '')}</span>
          <span class="open">Open →</span>
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx, 10);
        openModal(items[idx]);
      });
    });
  }

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Light markdown renderer for body
  function renderMarkdown(md) {
    if (!md) return '';
    let html = escapeHtml(md);
    // Bold
    html = html.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
    // Inline code
    html = html.replace(/`([^`]+?)`/g, '<code>$1</code>');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Headings (#### -> h4, ### -> h3, etc.)
    html = html.replace(/^####\s+(.+)$/gm, '<h4 style="font-size:14px;font-weight:700;margin:14px 0 6px;">$1</h4>');
    html = html.replace(/^###\s+(.+)$/gm, '<h3 style="font-size:15px;font-weight:700;margin:16px 0 8px;">$1</h3>');
    html = html.replace(/^##\s+(.+)$/gm, '<h2 style="font-size:17px;font-weight:700;margin:18px 0 10px;">$1</h2>');
    // Horizontal rule
    html = html.replace(/^\s*---\s*$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:14px 0;"/>');
    return html;
  }

  function openModal(item) {
    document.getElementById('modal-id').textContent = item.id || '—';
    document.getElementById('modal-type').textContent = item.type || '';
    document.getElementById('modal-section').textContent = item.section || '';
    document.getElementById('modal-title').textContent = item.title || 'Untitled';
    document.getElementById('modal-subtitle').textContent = item.subtitle || '';
    document.getElementById('modal-body').innerHTML = renderMarkdown(item.body || '(No content body)');

    const copyBtn = document.getElementById('copy-btn');
    copyBtn.textContent = 'Copy content';
    copyBtn.classList.remove('copied');
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(item.body || '');
        copyBtn.textContent = 'Copied ✓';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy content'; copyBtn.classList.remove('copied'); }, 1500);
      } catch (err) {
        alert('Could not copy. Please select text manually.');
      }
    };

    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  window.closeModal = () => {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  };

  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  render();
})();
</script>

</body>
</html>
